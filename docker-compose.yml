version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://pvadmin:pvopshub_secret_2025@postgres:5432/pvopshub?schema=public
      DIRECT_DATABASE_URL: postgresql://pvadmin:pvopshub_secret_2025@postgres:5432/pvopshub?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_pw_2025}@redis:6379
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-to-64-char-production-secret-value-here}
      PUSHER_APP_ID: ${PUSHER_APP_ID:-}
      PUSHER_KEY: ${PUSHER_KEY:-}
      PUSHER_SECRET: ${PUSHER_SECRET:-}
      PUSHER_CLUSTER: ${PUSHER_CLUSTER:-ap2}
      NEXT_PUBLIC_PUSHER_KEY: ${NEXT_PUBLIC_PUSHER_KEY:-}
      NEXT_PUBLIC_PUSHER_CLUSTER: ${NEXT_PUBLIC_PUSHER_CLUSTER:-ap2}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-PV-OpsHub <noreply@localhost>}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      METRICS_SECRET: ${METRICS_SECRET:-change-me-metrics-secret}
      ENABLE_PUSHER_REALTIME: ${ENABLE_PUSHER_REALTIME:-false}
      ENABLE_EMAIL_NOTIFICATIONS: ${ENABLE_EMAIL_NOTIFICATIONS:-false}
      ENABLE_BACKGROUND_JOBS: ${ENABLE_BACKGROUND_JOBS:-false}
    restart: unless-stopped
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:3000/api/health' ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pvnet

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: pvopshub
      POSTGRES_USER: pvadmin
      POSTGRES_PASSWORD: pvopshub_secret_2025
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c wal_level=replica
        -c max_wal_senders=3
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c log_min_duration_statement=1000
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U pvadmin -d pvopshub' ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pvnet

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-redis_secure_pw_2025}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secure_pw_2025}', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pvnet

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pvnet

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  pvnet:
    driver: bridge
