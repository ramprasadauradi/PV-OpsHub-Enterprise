name: CI
on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  NODE_VERSION: '20'
jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Generate Prisma client
        run: npm run db:generate
      - name: TypeScript check
        run: npm run type-check
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test:unit:coverage
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'
          NEXTAUTH_SECRET: 'ci-test-secret-not-for-production'
          ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'
          NEXTAUTH_SECRET: 'ci-test-secret-not-for-production'
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Audit dependencies
        run: npm audit --audit-level high
        continue-on-error: true
      - name: Check licenses
        run: npx license-checker --failOn 'GPL-3.0;AGPL-3.0' --summary
        continue-on-error: true
  e2e:
    name: E2E Tests
    needs: [quality]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pvopshub_test
          POSTGRES_USER: pvtest
          POSTGRES_PASSWORD: pvtest_password
        options: >-
          --health-cmd "pg_isready -U pvtest -d pvopshub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Run migrations
        run: npm run db:migrate:deploy
        env:
          DATABASE_URL: postgresql://pvtest:pvtest_password@localhost:5432/pvopshub_test
      - name: Seed test data
        run: npm run db:seed:test
        env:
          DATABASE_URL: postgresql://pvtest:pvtest_password@localhost:5432/pvopshub_test
      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: postgresql://pvtest:pvtest_password@localhost:5432/pvopshub_test
          NEXTAUTH_SECRET: e2e-test-secret-not-for-production
          REDIS_URL: redis://localhost:6379
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://pvtest:pvtest_password@localhost:5432/pvopshub_test
          NEXTAUTH_SECRET: e2e-test-secret-not-for-production
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_URL: http://localhost:3000
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
  deploy-staging:
    name: Deploy Staging
    needs: [quality, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy to Vercel (Preview)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Smoke test staging
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}/api/health")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Staging healthy"
  deploy-production:
    name: Deploy Production
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Run production migrations
        run: npm run db:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      - name: Deploy to Vercel (Production)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
      - name: Post-deploy health check
        run: |
          for i in {1..6}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}/api/health")
            if [ "$STATUS" = "200" ]; then
              echo "Production healthy after attempt $i"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 20s..."
            sleep 20
          done
          echo "Production health check failed after 6 attempts"
          exit 1
